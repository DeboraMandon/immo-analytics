version: "3.9"

# ============================================================
# immo-analytics — Stack Data Engineering
#
# Services :
#   postgres          : PostgreSQL 15 + PostGIS
#   airflow-init      : Initialisation one-shot (DB + user admin)
#   airflow-scheduler : Exécution des DAGs
#   airflow-webserver : Interface UI Airflow
#   ingestion         : Scripts de chargement des données (one-shot)
#   metabase          : Dashboards analytiques
#
# Ports exposés :
#   5433 → PostgreSQL  (5432 réservé au PostgreSQL local)
#   8080 → Airflow UI
#   3000 → Metabase
#
# Démarrage :
#   cp .env.example .env  # éditer les valeurs
#   docker compose up -d
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow_secret}@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-immo_analytics_secret}
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # Variables métier disponibles dans tous les DAGs
    IMMO_DB_URL: postgresql://immo_user:${POSTGRES_PASSWORD:-immo_secret}@postgres:5432/immo_dashboard
    INSEE_API_TOKEN: ${INSEE_API_TOKEN:-}
    DVF_ANNEE: ${DVF_ANNEE:-2025}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./ingestion:/opt/airflow/ingestion
    - airflow_logs:/opt/airflow/logs
    - dvf_cache:/opt/airflow/cache
  depends_on:
    postgres:
      condition: service_healthy
  user: "${AIRFLOW_UID:-50000}:0"

services:

  # ── PostgreSQL + PostGIS ──────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: immo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: immo_dashboard
      POSTGRES_USER: immo_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-immo_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./sql/init_airflow.sql:/docker-entrypoint-initdb.d/02_airflow.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immo_user -d immo_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow — Init (one-shot) ─────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: immo_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_USER:-admin} \
          --password ${AIRFLOW_PASSWORD:-admin} \
          --firstname Admin \
          --lastname Immo \
          --role Admin \
          --email admin@immo-analytics.fr || true
        echo "Airflow initialisé"
    restart: "no"

  # ── Airflow — Scheduler ───────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: immo_airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow — Webserver ───────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: immo_airflow_webserver
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Ingestion — Scripts de chargement (one-shot) ──────────
  ingestion:
    build: ./ingestion
    container_name: immo_ingestion
    restart: "no"
    environment:
      DATABASE_URL: postgresql://immo_user:${POSTGRES_PASSWORD:-immo_secret}@postgres:5432/immo_dashboard
      INSEE_API_TOKEN: ${INSEE_API_TOKEN:-}
    volumes:
      - ./ingestion:/app
      - dvf_cache:/app/cache
    depends_on:
      postgres:
        condition: service_healthy

  # ── Metabase — Dashboards analytiques ────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: immo_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: immo_user
      MB_DB_PASS: ${POSTGRES_PASSWORD:-immo_secret}
      MB_DB_HOST: postgres
      JAVA_TIMEZONE: Europe/Paris
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - metabase_data:/metabase-data

volumes:
  pgdata:
  airflow_logs:
  dvf_cache:
  metabase_data:
