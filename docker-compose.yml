version: "3.9"

# ============================================================
# immo-analytics — Stack Data Engineering
#
# Services :
#   postgres          : PostgreSQL 15 + PostGIS (données)
#   airflow-init      : Initialisation one-shot
#   airflow-scheduler : Exécution des DAGs
#   airflow-webserver : Interface UI Airflow :8080
#   ingestion         : Scripts de chargement (one-shot)
#
# Visualisation : Power BI Desktop (connexion directe port 5433)
#
# Démarrage :
#   cp .env.example .env
#   docker compose up -d
#   → Airflow : http://localhost:8080 (admin/admin)
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow_secret}@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-immo_secret}
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # Variables métier accessibles dans tous les DAGs
    IMMO_DB_URL: postgresql://immo_user:${POSTGRES_PASSWORD:-immo_secret}@postgres:5432/immo_dashboard
    INSEE_API_TOKEN: ${INSEE_API_TOKEN:-}
    FRED_API_KEY: ${FRED_API_KEY:-}
    DVF_ANNEE: ${DVF_ANNEE:-2025}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./ingestion:/opt/airflow/ingestion
    - airflow_logs:/opt/airflow/logs
    - dvf_cache:/opt/airflow/cache
  depends_on:
    postgres:
      condition: service_healthy
  user: "${AIRFLOW_UID:-50000}:0"

services:

  # ── PostgreSQL 15 + PostGIS ───────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: immo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: immo_dashboard
      POSTGRES_USER: immo_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-immo_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./sql/init_airflow.sql:/docker-entrypoint-initdb.d/02_airflow.sql
    ports:
      - "5433:5432"   # 5433 = évite conflit avec PostgreSQL local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immo_user -d immo_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow Init (one-shot) ───────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: immo_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install asyncpg httpx beautifulsoup4 lxml psycopg2-binary prophet --quiet
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_USER:-admin} \
          --password ${AIRFLOW_PASSWORD:-admin} \
          --firstname Admin \
          --lastname Immo \
          --role Admin \
          --email admin@immo-analytics.fr || true
        echo "✅ Airflow initialisé"
    restart: "no"

  # ── Airflow Scheduler ─────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: immo_airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Webserver ─────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: immo_airflow_webserver
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Ingestion (one-shot manuel) ───────────────────────────
  ingestion:
    build: ./ingestion
    container_name: immo_ingestion
    restart: "no"
    environment:
      DATABASE_URL: postgresql://immo_user:${POSTGRES_PASSWORD:-immo_secret}@postgres:5432/immo_dashboard
      INSEE_API_TOKEN: ${INSEE_API_TOKEN:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
    volumes:
      - ./ingestion:/app
      - dvf_cache:/app/cache
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  airflow_logs:
  dvf_cache:
